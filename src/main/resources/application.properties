spring.application.name=epermitservice

# Server
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# App DataSource (permit_app user — subject to RLS)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway DataSource (postgres superuser — bypasses RLS)
spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_ROOT_USERNAME}
spring.flyway.password=${DB_ROOT_PASSWORD}
spring.flyway.locations=classpath:db/migration

# JPA — Flyway owns the schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=14400000

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.version=openapi_3_0

# Resilience4j — Circuit Breaker
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.paymentGateway.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.paymentGateway.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j — Retry
resilience4j.retry.instances.paymentGateway.max-attempts=3
resilience4j.retry.instances.paymentGateway.wait-duration=1s
resilience4j.retry.instances.paymentGateway.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException